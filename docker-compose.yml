services:
  app:
    image: fireball
    build: 
      context: .
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 3s
    volumes:
      - redis_storage:/data

volumes:
  redis_storage: