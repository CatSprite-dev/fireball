services:
  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - static_files:/srv 
      - caddy_data:/data
    depends_on:
      web:
        condition: service_completed_successfully
      server: 
        condition: service_started
    restart: unless-stopped
  web:
    build: 
      context: .
      dockerfile: ./frontend/Dockerfile
    volumes:
      - static_files:/srv

  server:
    build:
      context: .
      dockerfile: ./Dockerfile
    expose:
      - "8080"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 3s
    volumes:
      - redis_storage:/data
    restart: unless-stopped

volumes:
  redis_storage:
  static_files:
  caddy_data:
